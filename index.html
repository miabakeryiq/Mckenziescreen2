<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Display</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }
  
  #wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
  }
  
  video {
    transform: rotate(90deg);
    transform-origin: center;
    width: 100vh;
    height: 100vw;
    max-width: 100vh;
    max-height: 100vw;
    object-fit: contain;
    display: block;
  }
  
  #debug {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-family: monospace;
    font-size: 12px;
    padding: 8px;
    border-radius: 6px;
    z-index: 999;
  }
</style>
</head>
<body>
<div id="wrapper">
  <video id="player" controls loop playsinline webkit-playsinline muted>
    <source src="11.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>
  <div id="debug">ready</div>
</div>

<script>
  const v = document.getElementById('player');
  const d = document.getElementById('debug');
  
  function updateDebug() {
    d.textContent = `video: ${v.videoWidth}x${v.videoHeight} ready=${v.readyState} playing=${!v.paused}`;
  }
  
  v.addEventListener('loadedmetadata', updateDebug);
  v.addEventListener('play', updateDebug);
  v.addEventListener('pause', updateDebug);
  v.addEventListener('error', () => {
    d.textContent = `ERROR: ${v.error ? v.error.code : 'unknown'}`;
  });
  
  // Auto-attempt play on load
  v.addEventListener('canplay', () => {
    v.play().catch(() => {});
  });
</script>
</body>
</html>
